name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: backend (lint + checks + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: complianceai
          POSTGRES_USER: complianceai
          POSTGRES_PASSWORD: complianceai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_NAME: complianceai
      DB_USER: complianceai
      DB_PASSWORD: complianceai
      DB_HOST: localhost
      DB_PORT: "5432"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Django system checks (production)
        env:
          DJANGO_DEBUG: "false"
          DJANGO_SECRET_KEY: "ci-only-not-a-real-secret"
          DJANGO_ALLOWED_HOSTS: "example.com"
        run: python manage.py check --deploy
      - name: Run tests
        run: python manage.py test

  frontend:
    name: frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_ci-placeholder"
        run: npm run build
